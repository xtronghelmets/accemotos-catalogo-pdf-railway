<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Catálogos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-title">Generador de catálogos</div>
    <div class="nav-api" id="nav-api">
      <span class="nav-dot"></span>
      <span class="nav-api-text">Listo</span>
    </div>
  </nav>

  <main class="main">

    <!-- MARCA -->
    <section class="card">
      <div class="sec-label">Selecciona la marca</div>
      <div class="brand-row">
        <label class="brand-option" id="opt-xtrong">
          <input type="radio" name="marca" value="xtrong" checked hidden />
          <div class="radio-circle" id="rc-xtrong"><div class="radio-dot"></div></div>
          <div class="brand-info">
            <div class="brand-name" id="bn-xtrong">XTRONG</div>
            <div class="brand-sub" id="bs-xtrong">xtronghelmets.com · cargando...</div>
          </div>
        </label>
        <label class="brand-option" id="opt-xecuro">
          <input type="radio" name="marca" value="xecuro" hidden />
          <div class="radio-circle" id="rc-xecuro"><div class="radio-dot"></div></div>
          <div class="brand-info">
            <div class="brand-name" id="bn-xecuro">XECURO</div>
            <div class="brand-sub" id="bs-xecuro">xecurohelmets.com · cargando...</div>
          </div>
        </label>
      </div>
    </section>

    <!-- INFO DEL CATÁLOGO -->
    <section class="card">
      <div class="sec-label">Información del catálogo</div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" for="titulo">Título del catálogo</label>
          <input class="field-input" id="titulo" type="text" placeholder="Ej: Cascos integrales" />
        </div>
        <div class="field">
          <label class="field-label" for="periodo">Período</label>
          <input class="field-input" id="periodo" type="text" placeholder="Ej: Junio 2025 · Semana 1" />
        </div>
      </div>
    </section>

    <!-- CATEGORÍAS -->
    <section class="card">
      <div class="sec-label">Categorías a incluir</div>
      <div class="cat-grid" id="cat-grid">
        <div class="cat-loading">Cargando categorías...</div>
      </div>
    </section>

    <!-- OPCIONES -->
    <section class="card">
      <div class="sec-label">Opciones</div>
      <div class="toggle-list">
        <div class="toggle-row">
          <span class="toggle-label">Mostrar precios</span>
          <div class="tog on" id="tog-precios" data-key="precios"></div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Solo con inventario disponible</span>
          <div class="tog on" id="tog-stock" data-key="stock"></div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Incluir accesorios adicionales</span>
          <div class="tog off" id="tog-accesorios" data-key="accesorios"></div>
        </div>
      </div>
    </section>

    <!-- PREVIEW + BOTÓN -->
    <section class="card">
      <div class="sec-label">Vista previa de páginas</div>
      <div class="preview-strip" id="preview-strip">
        <!-- generado por JS -->
      </div>
      <button class="btn-gen" id="btn-gen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Generar y descargar catálogo
      </button>
    </section>

    <!-- PROGRESO + AVISOS -->
    <section class="card" id="card-progreso" style="display:none;">
      <div class="sec-label">Progreso</div>
      <div class="prog-wrap">
        <div class="prog-top">
          <span class="prog-label" id="prog-label">Iniciando...</span>
          <span class="prog-pct" id="prog-pct">0%</span>
        </div>
        <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-sub" id="prog-sub">&nbsp;</div>
      </div>
      <hr class="divider" />
      <div class="sec-label" style="margin-top:12px;">Avisos de actividad</div>
      <div class="avisos-box" id="avisos-box"></div>
    </section>

  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
