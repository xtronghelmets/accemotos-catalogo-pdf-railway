<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Catálogos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .periodo-alerta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 8px 12px;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      color: #c53030;
      font-size: 13px;
      font-weight: 500;
    }
    .periodo-alerta svg { flex-shrink: 0; }
    .periodo-alerta.hidden { display: none; }
    .btn-gen:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }
    .precio-check-row {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }
    .precio-check-option {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1.5px solid #e2e2e2;
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .precio-check-option input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .precio-check-box {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border-radius: 6px;
      border: 1.5px solid #c4c4c4;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .precio-check-mark {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: transparent;
      transition: background 0.15s ease;
    }
    .precio-check-label {
      font-size: 14px;
      font-weight: 600;
      color: #222;
    }
    .precio-check-option.checked {
      border-color: var(--marca-color, #005654);
      background: color-mix(in srgb, var(--marca-color, #005654) 6%, white);
    }
    .precio-check-option.checked .precio-check-box {
      background: var(--marca-color, #005654);
      border-color: var(--marca-color, #005654);
    }
    .precio-check-option.checked .precio-check-mark {
      background: var(--marca-acento, #B6FF00);
    }
    .precio-check-hint {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-title">Generador de catálogos</div>
    <div class="nav-api" id="nav-api">
      <span class="nav-dot"></span>
      <span class="nav-api-text">Listo</span>
    </div>
  </nav>

  <main class="main">

    <!-- MARCA -->
    <section class="card">
      <div class="sec-label">Selecciona la marca</div>
      <div class="brand-row">
        <label class="brand-option" id="opt-xtrong">
          <input type="radio" name="marca" value="xtrong" checked hidden />
          <div class="radio-circle" id="rc-xtrong"><div class="radio-dot"></div></div>
          <div class="brand-info">
            <div class="brand-name" id="bn-xtrong">XTRONG</div>
            <div class="brand-sub" id="bs-xtrong">xtronghelmets.com</div>
          </div>
        </label>
        <label class="brand-option" id="opt-xecuro">
          <input type="radio" name="marca" value="xecuro" hidden />
          <div class="radio-circle" id="rc-xecuro"><div class="radio-dot"></div></div>
          <div class="brand-info">
            <div class="brand-name" id="bn-xecuro">XECURO</div>
            <div class="brand-sub" id="bs-xecuro">xecurohelmets.com</div>
          </div>
        </label>
      </div>
    </section>

    <!-- PERÍODO -->
    <section class="card">
      <div class="sec-label">Período <span style="color:#e53e3e;">*</span></div>
      <div class="field">
        <input class="field-input" id="periodo" type="text" placeholder="Ej: Junio 2025 · Semana 1" />
        <div class="periodo-alerta" id="periodo-alerta">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          El período es obligatorio para generar el catálogo
        </div>
      </div>
    </section>

    <!-- TIPO DE CATÁLOGO -->
    <section class="card" id="card-cats">
      <div class="sec-label">Tipo de catálogo</div>
      <div class="cat-tipo-list" id="cat-tipo-list">
        <!-- generado por JS según marca -->
      </div>
    </section>

    <!-- PRECIOS -->
    <section class="card">
      <div class="sec-label">Precios a mostrar</div>
      <div class="precio-check-row">
        <label class="precio-check-option" id="opt-precio-mayor">
          <input type="checkbox" id="chk-precio-mayor" />
          <span class="precio-check-box"><span class="precio-check-mark"></span></span>
          <span class="precio-check-label">Precio al mayor</span>
        </label>
        <label class="precio-check-option" id="opt-precio-detal">
          <input type="checkbox" id="chk-precio-detal" />
          <span class="precio-check-box"><span class="precio-check-mark"></span></span>
          <span class="precio-check-label">Precio al detal</span>
        </label>
      </div>
      <div class="precio-check-hint">Sin marcar ninguno, el catálogo se genera sin precios.</div>
    </section>

    <!-- BOTÓN -->
    <section class="card">
      <button class="btn-gen" id="btn-gen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Generar y descargar catálogo
      </button>
    </section>

    <!-- PROGRESO + AVISOS -->
    <section class="card" id="card-progreso" style="display:none;">
      <div class="sec-label">Progreso</div>
      <div class="prog-wrap">
        <div class="prog-top">
          <span class="prog-label" id="prog-label">Iniciando...</span>
          <span class="prog-pct" id="prog-pct">0%</span>
        </div>
        <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-sub" id="prog-sub">&nbsp;</div>
      </div>
      <hr class="divider" />
      <div class="sec-label" style="margin-top:12px;">Avisos de actividad</div>
      <div class="avisos-box" id="avisos-box"></div>
    </section>

  </main>

  <script src="/static/js/app.js"></script>
  <script>
    (function () {
      const periodoInput = document.getElementById('periodo');
      const alerta       = document.getElementById('periodo-alerta');
      const btnGen       = document.getElementById('btn-gen');

      function actualizarEstado() {
        const vacio = periodoInput.value.trim() === '';
        alerta.classList.toggle('hidden', !vacio);
        btnGen.disabled = vacio;
      }

      // Estado inicial — botón deshabilitado hasta que escriban
      actualizarEstado();
      periodoInput.addEventListener('input', actualizarEstado);
    })();
  </script>
</body>
</html>
